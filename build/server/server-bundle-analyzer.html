      #resultsPanel {

      }
      section {

        max-width: 600px;
      }
      #logo {

        padding-left: 100px;
        display: inline-block;
        text-align: left;
        margin-bottom: 10px;

      h1 {

        line-height: 1em;
        color: var(--fg-on);

      blockquote {

      }
      p {

      a,

      #summaryPanel td:first-child {

      #summaryPanel .bar > div {

        align-items: center;
      }

      }

        flex: 1;
        height: 20px;
      }
      #sunburstPanel .dir a {

        text-decoration: none;
      }
      #sunburstPanel .dir a[href]:hover {

      }
      #sunburstPanel .dir a:last-child {
        opacity: 1;

        font-weight: 700;
      }
      #sunburstPanel .bars {
        width: 100%;

      #sunburstPanel .bars .row {
        display: table-row;
        text-decoration: none;
        line-height: 26px;
        color: var(--fg);

        top: 1px;
        right: 1px;
        bottom: 1px;

      #sunburstPanel .bars .row > div {
        display: table-cell;
      }
      #sunburstPanel .bars .name {

        opacity: 0.5;
      }
      #warningsPanel pre a {
        text-decoration: none;
      }

        text-decoration: underline;
      }
